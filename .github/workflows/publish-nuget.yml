name: Publish NuGet

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: windows-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack .\src\IvTem.ExternalProcessManager\IvTem.ExternalProcessManager.csproj --configuration Release --no-build --output .\artifacts

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: IvanTemelkov

      - name: Publish package
        shell: pwsh
        run: |
          $package = Get-ChildItem -Path .\artifacts -Filter "IvTem.ExternalProcessManager.*.nupkg" |
            Where-Object { $_.Name -notlike "*.symbols.nupkg" } |
            Select-Object -First 1

          if (-not $package) {
            throw "Package not found in artifacts folder."
          }

          dotnet nuget push $package.FullName `
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" `
            --source "https://api.nuget.org/v3/index.json" `
            --skip-duplicate
